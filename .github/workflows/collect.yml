name: Daily Data Collection

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Node 24 compatibility
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Collect data
        run: npx tsx scripts/collect-data.ts
        env:
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Alerts go to daily digest only

      - name: Take trend snapshots
        run: npx tsx scripts/take-snapshots.ts
        env:
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Data Bot"
          git config user.email "bot@tubefission.com"
          git add public/data/history.json data/
          git diff --cached --quiet || (git commit -m "📊 Daily data collection $(date +%Y-%m-%d)" && git push)
