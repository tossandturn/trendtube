name: Health Check

on:
  schedule:
    - cron: '0 * * * *'  # Every hour - health check only, no emails
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        run: npx tsx scripts/health-check.ts
        env:
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # No email env vars - alerts go to daily digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: data/daily-digest.json
          retention-days: 7

